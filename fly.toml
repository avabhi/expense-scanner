# fly.toml app configuration file generated for expense-scanner-backend on 2026-05-30T12:47:47+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'expense-scanner-backend'
primary_region = 'iad'

[build]

[deploy]
  release_command = 'alembic upgrade head'

[processes]
  web = 'uvicorn app.main:app --host 0.0.0.0 --port 8000'
  worker = 'celery -A app.worker.celery_app worker --loglevel=info -Q main-queue,celery'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['web']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
