version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: expense_scanner_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: expense_scanner
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: expense_scanner_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio:latest
    container_name: expense_scanner_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: mock_key
      MINIO_ROOT_PASSWORD: mock_secret
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  init-s3:
    image: minio/mc:latest
    container_name: expense_scanner_init_s3
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set localminio http://minio:9000 mock_key mock_secret;
      mc mb localminio/expense-scanner-receipts || true;
      echo 'MinIO Bucket expense-scanner-receipts created.';
      "

  web:
    build: .
    container_name: expense_scanner_web
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - .:/app
      - /app/.venv
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/expense_scanner
      - REDIS_URL=redis://redis:6379/0
      - AWS_ACCESS_KEY_ID=mock_key
      - AWS_SECRET_ACCESS_KEY=mock_secret
      - AWS_REGION=us-east-1
      - AWS_BUCKET_NAME=expense-scanner-receipts
      - AWS_ENDPOINT_URL=http://minio:9000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - SECRET_KEY=${SECRET_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy

  worker:
    build: .
    container_name: expense_scanner_worker
    command: watchfiles --filter python "celery -A app.worker.celery_app worker --loglevel=info -Q main-queue,celery" app
    volumes:
      - .:/app
      - /app/.venv
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/expense_scanner
      - REDIS_URL=redis://redis:6379/0
      - AWS_ACCESS_KEY_ID=mock_key
      - AWS_SECRET_ACCESS_KEY=mock_secret
      - AWS_REGION=us-east-1
      - AWS_BUCKET_NAME=expense-scanner-receipts
      - AWS_ENDPOINT_URL=http://minio:9000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - SECRET_KEY=${SECRET_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  miniodata:
